---
apiVersion: v1
kind: Pod
metadata:
  name: quobyte-pvc-test-pod-a
  labels:
    app: quobyte-pvc-test-pod
spec:
  volumes:
    - name: quobyte-backend
      persistentVolumeClaim:
        claimName: shared-volume-claim-a 
        readOnly: false
  containers:
    - name: app
      image: python:3.12-alpine
      securityContext:
        runAsUser: 0 
        runAsGroup: 0
        privileged: true
      command: ["/bin/sh", "-c"]
      args:
        - |
          set -eu
          trap 'exit 0' TERM INT
          sleep infinity &
          wait $!
      volumeMounts:
        - name: quobyte-backend
          mountPath: /mnt/quobyte-shared
