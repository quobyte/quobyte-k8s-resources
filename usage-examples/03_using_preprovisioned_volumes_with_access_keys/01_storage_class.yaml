kind: StorageClass
allowVolumeExpansion: true
apiVersion: storage.k8s.io/v1
provisioner: csi.quobyte.com
reclaimPolicy: Delete
volumeBindingMode: Immediate
metadata:
  # Quobyte "Bring your own secret"
  name: quobyte-byos
parameters:
  accessMode: "755"
  createQuota: "true"
  
  csi.storage.k8s.io/provisioner-secret-name: my-tenant-admin-secret
  csi.storage.k8s.io/provisioner-secret-namespace: kube-system 
  csi.storage.k8s.io/node-publish-secret-name: ${pvc.annotations['user-secret']}
  csi.storage.k8s.io/node-publish-secret-namespace: ${pvc.namespace} 
  csi.storage.k8s.io/controller-expand-secret-name: my-tenant-admin-secret 
  csi.storage.k8s.io/controller-expand-secret-namespace: kube-system
  labels: usagetype:exploringTheOcean
  quobyteTenant: "My Tenant"

