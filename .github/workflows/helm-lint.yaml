name: Helm Lint

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - '**.yaml'
      - '**.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'helm/**'
      - '**.yaml'
      - '**.yml'

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'latest'

      - name: Run Helm Lint on All Charts
        run: |
          # Track if any linting fails so we can exit with an error at the end
          FAILED=0

          for dir in helm/*/; do
            if [ -f "${dir}Chart.yaml" ]; then
              echo "=========================================================="
              echo "Linting chart: $(basename "$dir")"
              echo "=========================================================="
              
              if ! helm lint "$dir"; then
                echo "❌ Linting failed for $(basename "$dir")"
                FAILED=1
              else
                echo "✅ Linting passed for $(basename "$dir")"
              fi
              echo ""
            fi
          done

          # If any chart failed to lint, fail the entire GitHub Action workflow
          if [ $FAILED -ne 0 ]; then
            echo "One or more Helm charts failed validation."
            exit 1
          fi
